<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Search</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <nav>
            <a href="images.html">Image Search</a>
            <a href="advanced.html">Advanced Search</a>
        </nav>

        <div class="search-wrapper">
            <div class="search-container">
                <img alt="Search icon" src="assets/search-icon.png">
                <form action="https://google.com/search">
                    <input class="input" type="text" name="q" placeholder="Search...">
                    <div class="button-container">
                        <input class="search-button" type="submit" value="Google Search">
                        <input class="search-button" type="submit" name="btnI" value="I'm feeling lucky">
                    </div>
                </form>
            </div>
        </div>
        
    </body>
</html>
